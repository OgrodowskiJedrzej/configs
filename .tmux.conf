##### PREFIX #####
# Change prefix from Ctrl-b to Ctrl-a (GNU screen style)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Allow fast-repeat of prefix commands
set -s escape-time 10


##### SPLITS #####
# Split panes using | and -
unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

##### PANE SWITCHING (Option + Arrows) #####
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

##### PANE RESIZING (Shift + Arrows) #####
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5
bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5



##### WINDOWS #####
# Renaming window
bind r command-prompt "rename-window '%%'"

# Fast window switching
bind -r n next-window
bind -r p previous-window


##### COPY MODE #####
# Enable vi keys
setw -g mode-keys vi

# Use system clipboard when possible
set-option -g set-clipboard on

# Better copy-mode bindings
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel


##### STATUS BAR #####
# Make status bar clean and informative
set -g status-bg black
set -g status-fg white
set -g status-interval 1

# Left side
set -g status-left-length 30
set -g status-left "#[bold] #S #[default]"

# Right side: time + date
set -g status-right-length 80
set -g status-right "#[fg=green]%H:%M #[fg=cyan]%Y-%m-%d"

# Highlight active window
setw -g window-status-current-format "#[bold][#I:#W]"

##### QUALITY OF LIFE #####
# Enable mouse support (resizing, selecting panes, scrolling)
set -g mouse on

# True color support
set -g default-terminal "tmux-256color"

# Allow vim, less, etc., to behave correctly inside tmux
set -ga terminal-overrides ',xterm-256color:RGB'

##### SESSION MANAGEMENT #####
# Easier session switching
bind-key ( choose-tree
bind-key ) choose-session

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

unbind x
bind x kill-pane
